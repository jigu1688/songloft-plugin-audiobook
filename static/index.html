<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>有声书播放器</title>
    <!-- main.go injectHTMLHead will inject common.css and common.js automatically here -->
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <div class="app-container">
        
        <!-- ================= HOME PAGE ================= -->
        <div class="page" id="home-page">
            <!-- Header -->
            <header class="app-header">
                <div class="header-left">
                    <div class="logo-icon">
                        <svg viewBox="0 0 24 24" class="svg-icon"><path fill="currentColor" d="M12,2A10,10 0 0,0 2,12V18A3,3 0 0,0 5,21H8V14H4V12A8,8 0 0,1 12,4A8,8 0 0,1 20,12V14H16V21H19A3,3 0 0,0 22,18V12A10,10 0 0,0 12,2M12,6A6,6 0 0,0 6,12V13H8V19H7A1,1 0 0,1 6,18V15H4V12A8,8 0 0,1 12,6Z"/></svg>
                    </div>
                    <div class="header-info">
                        <h1>有声书</h1>
                        <span class="sub-text">本地资源管理器</span>
                    </div>
                </div>
                <div class="header-right">
                    <div class="search-box">
                        <input type="text" id="search-input" placeholder="搜索书名、作者、简介...">
                        <button class="icon-btn" id="search-btn">
                            <svg viewBox="0 0 24 24" class="svg-icon"><path fill="currentColor" d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.59 14.44,13.73L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.73,14.44C12.59,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z"/></svg>
                        </button>
                    </div>
                    <button id="scan-btn" title="加载书籍">
                        <span class="btn-text">加载</span>
                        <span class="spinner hidden"></span>
                    </button>
                </div>
            </header>

            <!-- Main Content -->
            <main class="app-main">
                <!-- Filter & Sort Bar -->
                <div class="control-bar">
                    <div class="control-left">
                        <label for="sort-select">排序:</label>
                        <select id="sort-select" class="select-input">
                            <option value="name">书名排序</option>
                            <option value="chapters">章节数量</option>
                            <option value="size">文件大小</option>
                        </select>
                        <label class="checkbox-container">
                            <input type="checkbox" id="favorite-filter">
                            <span class="checkmark"></span>
                            只看收藏
                        </label>
                    </div>
                    <div class="control-right">
                        <span id="book-count" class="badge">共 0 本</span>
                    </div>
                </div>

                <!-- Scanning Progress banner (hidden by default) -->
                <div id="scan-progress-banner" class="progress-banner hidden">
                    <div class="progress-text">正在扫描目录... 已发现 <span id="progress-count">0</span> 本书籍</div>
                    <div class="progress-folder-info" id="progress-folder">/app/audiobook</div>
                </div>

                <!-- Recently Played Section -->
                <section class="recent-section hidden" id="recent-section">
                    <h2>最近播放</h2>
                    <div class="recent-grid" id="recent-grid">
                        <!-- Recently played items injected here -->
                    </div>
                </section>

                <!-- All Books Grid Section -->
                <section class="books-section">
                    <h2>全部书籍</h2>
                    <div class="books-grid" id="books-grid">
                        <!-- Book cards injected here -->
                    </div>
                    <div class="empty-state hidden" id="empty-state">
                        <div class="empty-icon">
                            <svg viewBox="0 0 24 24" class="svg-icon"><path fill="currentColor" d="M19,2H5A2,2 0 0,0 3,4V20A2,2 0 0,0 5,22H19A2,2 0 0,0 21,20V4A2,2 0 0,0 19,2M19,20H5V4H19V20M17,17H7V15H17V17M17,13H7V11H17V13M17,9H7V7H17V9Z"/></svg>
                        </div>
                        <p>未发现书籍，请点击右上角按钮开始扫描</p>
                    </div>
                </section>
            </main>
        </div>

        <!-- ================= DETAIL PAGE ================= -->
        <div class="page hidden" id="detail-page">
            <div class="page-header-bar">
                <button class="back-link-btn" id="detail-back-btn">
                    <svg viewBox="0 0 24 24" class="svg-icon-small"><path fill="currentColor" d="M20,11H7.83L13.42,5.41L12,4L4,12L12,20L13.41,18.59L7.83,13H20V11Z"/></svg>
                    返回
                </button>
            </div>
            
            <div class="detail-container">
                <div class="book-detail-header-card">
                    <div class="cover-wrapper">
                        <img id="detail-cover" class="book-cover-large" src="./static/css/placeholder-cover.svg" alt="Cover">
                    </div>
                    <div class="book-detail-meta-wrapper">
                        <div class="title-row">
                            <h2 id="detail-title">书籍标题</h2>
                            <button class="icon-btn edit-pencil-btn" id="detail-edit-btn" title="编辑书籍信息">
                                <svg viewBox="0 0 24 24" class="svg-icon"><path fill="currentColor" d="M20.71,7.04C21.1,6.65 21.1,6 20.71,5.63L18.37,3.29C18,2.9 17.35,2.9 16.96,3.29L15.12,5.12L18.88,8.88L20.71,7.04M3,17.25V21H6.75L17.81,9.93L14.07,6.19L3,17.25Z"/></svg>
                            </button>
                        </div>
                        <div class="author-row">
                            <span>作者：</span><span id="detail-author">作者</span>
                        </div>
                        <div class="stats-row">
                            <span id="detail-stats">0 章节 • 0 B • 默认</span>
                        </div>
                        <div class="tags-row" id="detail-tags-container">
                            <!-- Tags injected here -->
                        </div>
                        <div class="desc-row">
                            <p id="detail-desc">暂无简介</p>
                        </div>
                        <div class="action-buttons-row">
                            <button class="btn btn-primary" id="detail-play-all-btn">
                                <svg viewBox="0 0 24 24" class="svg-icon-small"><path fill="currentColor" d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>
                                从第一集播放
                            </button>
                            <button class="btn btn-outline" id="detail-fav-btn">
                                <svg viewBox="0 0 24 24" class="svg-icon-small"><path fill="currentColor" d="M12,17.27L18.18,21L16.54,13.97L22,9.24L14.81,8.62L12,2L9.19,8.62L2,9.24L7.45,13.97L5.82,21L12,17.27Z"/></svg>
                                <span>收藏</span>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="chapter-list-section">
                    <div class="chapter-list-header">
                        <h3>章节列表 (<span id="detail-chapters-count">0</span>)</h3>
                        <button class="sort-toggle-btn" id="chapters-sort-toggle">
                            <span class="sort-text">正序</span>
                            <svg viewBox="0 0 24 24" class="svg-icon-small sort-icon-asc"><path fill="currentColor" d="M7,10L12,15L17,10H7Z"/></svg>
                        </button>
                    </div>
                    <div class="chapter-list" id="detail-chapter-list">
                        <!-- Chapter items injected here -->
                    </div>
                </div>
            </div>
        </div>

        <!-- ================= NOW PLAYING PAGE ================= -->
        <div class="page hidden" id="player-page">
            <div class="page-header-bar">
                <button class="back-link-btn" id="player-back-btn">
                    <svg viewBox="0 0 24 24" class="svg-icon-small"><path fill="currentColor" d="M20,11H7.83L13.42,5.41L12,4L4,12L12,20L13.41,18.59L7.83,13H20V11Z"/></svg>
                    返回
                </button>
            </div>

            <div class="player-main-container">
                <!-- Vinyl Disc rotation -->
                <div class="vinyl-disc-container">
                    <div class="vinyl-disc" id="vinyl-disc">
                        <img id="player-cover" src="./static/css/placeholder-cover.svg" alt="Cover">
                    </div>
                </div>

                <!-- Titles -->
                <div class="player-title-info">
                    <h2 id="player-book-title">书籍名称</h2>
                    <p id="player-chapter-title">当前章节名称</p>
                </div>

                <!-- Progress / Slider -->
                <div class="player-timeline-wrapper">
                    <div class="player-progress-container">
                        <span id="player-time-current" class="time-label">00:00</span>
                        <input type="range" id="player-progress-slider" min="0" max="100" value="0">
                        <span id="player-time-duration" class="time-label">00:00</span>
                    </div>
                </div>

                <!-- Main playback controls -->
                <div class="player-controls-wrapper">
                    <!-- Skip backward 15s -->
                    <button class="control-btn-circle" id="skip-back-btn" title="后退15秒">
                        <svg viewBox="0 0 24 24" class="svg-icon"><path fill="currentColor" d="M12.5,3C17.15,3 21.08,6.03 22.47,10.22L20.1,11C19.05,7.81 16.04,5.5 12.5,5.5C9.07,5.5 6.18,7.63 5.07,10.68L7.6,11.5L3.5,15.5L0.5,10.5L3,11.3C4.46,7.5 8.16,4.8 12.5,3M11,18V10H8.5V11.5H9.5V18H11M14,10H16.5C17.3,10 18,10.7 18,11.5V13.5C18,14.3 17.3,15 16.5,15H15.5V16.5H16.5C17.3,16.5 18,17.2 18,18V19.5C18,20.3 17.3,21 16.5,21H14V19.5H15.5V18H14.5V16.5H15.5V15H14.5V13.5H15.5V11.5H14V10Z"/></svg>
                    </button>

                    <!-- Previous Chapter -->
                    <button class="control-btn-circle" id="prev-btn" title="上一章">
                        <svg viewBox="0 0 24 24" class="svg-icon"><path fill="currentColor" d="M6,18V6H8V18H6M9.5,12L18,6V18L9.5,12Z"/></svg>
                    </button>

                    <!-- Play / Pause (Large) -->
                    <button class="control-btn-circle play-btn-large" id="play-pause-btn">
                        <svg id="svg-play" viewBox="0 0 24 24" class="svg-icon-large"><path fill="currentColor" d="M8,5.14V19.14L19,12.14L8,5.14Z"/></svg>
                        <svg id="svg-pause" viewBox="0 0 24 24" class="svg-icon-large hidden"><path fill="currentColor" d="M14,19H18V5H14M6,19H10V5H6V19Z"/></svg>
                    </button>

                    <!-- Next Chapter -->
                    <button class="control-btn-circle" id="next-btn" title="下一章">
                        <svg viewBox="0 0 24 24" class="svg-icon"><path fill="currentColor" d="M4,18L12.5,12L4,6V18M13,6V18H15V6H13Z"/></svg>
                    </button>

                    <!-- Skip forward 15s -->
                    <button class="control-btn-circle" id="skip-forward-btn" title="前进15秒">
                        <svg viewBox="0 0 24 24" class="svg-icon"><path fill="currentColor" d="M10,3C14.34,3 18.04,5.7 19.5,9.5L22,8.7L19,13.7L14.9,9.7L17.43,8.88C16.32,5.83 13.43,3.7 10,3.7C6.46,3.7 3.45,6 2.4,9.2L0.03,8.42C1.42,4.23 5.35,1.2 10,3M11.5,10V18H10V16.5H9V15H10V11.5H8.5V10H11.5M14,10H15.5V11.5H14.5V13.5H15.5V15H14.5V16.5H15.5V18H14V19.5H16.5C17.3,19.5 18,18.8 18,18V16.5C18,15.7 17.3,15 16.5,15V13.5C17.3,13.5 18,12.8 18,12V11.5C18,10.7 17.3,10 16.5,10H14V11.5Z"/></svg>
                    </button>
                </div>

                <!-- Volume and bottom function row -->
                <div class="player-footer-wrapper">
                    <!-- Speed Controller -->
                    <div class="speed-control">
                        <button class="circular-menu-btn" id="speed-btn">1.0x</button>
                        <div class="speed-menu hidden" id="speed-menu">
                            <div class="speed-option" data-speed="0.75">0.75x</div>
                            <div class="speed-option active" data-speed="1.0">1.0x</div>
                            <div class="speed-option" data-speed="1.25">1.25x</div>
                            <div class="speed-option" data-speed="1.5">1.5x</div>
                            <div class="speed-option" data-speed="1.75">1.75x</div>
                            <div class="speed-option" data-speed="2.0">2.0x</div>
                        </div>
                    </div>

                    <!-- Sleep Timer -->
                    <div class="sleep-timer-control">
                        <button class="circular-menu-btn" id="sleep-timer-btn" title="睡眠定时">
                            <svg viewBox="0 0 24 24" class="svg-icon"><path fill="currentColor" d="M12 20C16.42 20 20 16.42 20 12C20 7.58 16.42 4 12 4C7.58 4 4 7.58 4 12C4 16.42 7.58 20 12 20M12 2C17.52 2 22 6.48 22 12C22 17.52 17.52 22 12 22C6.48 22 2 17.52 2 12C2 6.48 6.48 2 12 2M12.5 7V12.25L17 14.92L16.25 16.15L11 13V7H12.5Z"/></svg>
                        </button>
                        <div class="sleep-menu hidden" id="sleep-menu">
                            <div class="sleep-option active" data-minutes="0">无定时</div>
                            <div class="sleep-option" data-minutes="10">10 分钟</div>
                            <div class="sleep-option" data-minutes="20">20 分钟</div>
                            <div class="sleep-option" data-minutes="30">30 分钟</div>
                            <div class="sleep-option" data-minutes="60">60 分钟</div>
                            <div class="sleep-option" data-minutes="90">90 分钟</div>
                        </div>
                    </div>

                    <!-- Quick Chapter list overlay trigger -->
                    <div class="quick-list-control">
                        <button class="circular-menu-btn" id="quick-list-btn" title="播放列表">
                            <svg viewBox="0 0 24 24" class="svg-icon"><path fill="currentColor" d="M3,4H21V6H3V4M3,9H21V11H3V9M3,14H21V16H3V14M3,19H21V21H3V19Z"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ================= FLOATING ACTION PLAYER BUTTON ================= -->
        <button class="floating-player-btn hidden" id="floating-player-btn" title="正在播放">
            <svg viewBox="0 0 24 24" class="svg-icon"><path fill="currentColor" d="M12,2A10,10 0 0,0 2,12V18A3,3 0 0,0 5,21H8V14H4V12A8,8 0 0,1 12,4A8,8 0 0,1 20,12V14H16V21H19A3,3 0 0,0 22,18V12A10,10 0 0,0 12,2Z"/></svg>
        </button>

        <!-- ================= EDIT BOOK MODAL ================= -->
        <div class="modal-overlay hidden" id="edit-modal-overlay">
            <div class="modal" id="edit-modal">
                <div class="modal-header">
                    <h3>编辑书籍信息</h3>
                    <button class="icon-btn modal-close-btn" id="edit-modal-close">
                        <svg viewBox="0 0 24 24" class="svg-icon"><path fill="currentColor" d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z"/></svg>
                    </button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label for="edit-book-title">书名</label>
                        <input type="text" id="edit-book-title" class="form-input">
                    </div>
                    <div class="form-group">
                        <label for="edit-book-author">作者</label>
                        <input type="text" id="edit-book-author" class="form-input">
                    </div>
                    <div class="form-group">
                        <label for="edit-book-desc">简介</label>
                        <textarea id="edit-book-desc" class="form-input text-area" rows="4"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="edit-book-type">类型</label>
                        <input type="text" id="edit-book-type" class="form-input" placeholder="例如：默认、科幻、少儿">
                    </div>
                    <div class="form-group">
                        <label for="edit-book-tags">标签 (逗号分隔)</label>
                        <input type="text" id="edit-book-tags" class="form-input" placeholder="例如：科幻, 三体, 刘慈欣">
                    </div>
                    <div class="form-group">
                        <label>封面</label>
                        <div class="cover-edit-row">
                            <div class="cover-edit-preview">
                                <img id="edit-cover-preview" src="./static/css/placeholder-cover.svg" alt="Preview">
                            </div>
                            <div class="cover-edit-inputs">
                                <input type="text" id="edit-cover-url" class="form-input" placeholder="或输入图片 URL...">
                                <div class="file-input-wrapper">
                                    <button class="btn btn-outline" id="file-select-trigger">选择文件</button>
                                    <input type="file" id="edit-cover-file" accept="image/*" class="hidden">
                                    <span id="selected-filename">未选择文件</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-outline" id="edit-modal-cancel">取消</button>
                    <button class="btn btn-primary" id="edit-modal-save">保存</button>
                </div>
            </div>
        </div>

        <!-- ================= QUICK CHAPTERS OVERLAY (PLAYER VIEW) ================= -->
        <div class="modal-overlay hidden" id="quick-list-overlay">
            <div class="modal bottom-modal" id="quick-list-modal">
                <div class="modal-header">
                    <h3>章节目录</h3>
                    <button class="icon-btn modal-close-btn" id="quick-list-close">
                        <svg viewBox="0 0 24 24" class="svg-icon"><path fill="currentColor" d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z"/></svg>
                    </button>
                </div>
                <div class="modal-body max-height-modal-body">
                    <div class="chapter-list" id="player-chapter-list">
                        <!-- Chapter items injected here -->
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Hidden HTML5 Audio Element -->
    <audio id="html5-audio" preload="auto"></audio>

    <script src="static/js/app.js"></script>
</body>
</html>
